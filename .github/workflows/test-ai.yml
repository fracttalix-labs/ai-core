name: AI Task Runner

on:
  workflow_dispatch:
    inputs:
      task:
        description: "What should the AI do?"
        required: true
        default: "Summarize anomaly detection"

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Run AI task
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          RESPONSE=$(curl -s https://api.openai.com/v1/responses \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-5.4-mini",
              "input": "'"${{ github.event.inputs.task }}"'"
            }')

          echo "$RESPONSE" > output.json
          cat output.json
