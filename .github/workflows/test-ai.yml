name: Dual AI Task Runner

on:
  workflow_dispatch:
    inputs:
      task:
        description: "What should the AI do?"
        required: true
        default: "Explain anomaly detection in one sentence"

permissions:
  contents: write

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Call Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CLAUDE_RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            --header "x-api-key: $ANTHROPIC_API_KEY" \
            --header "anthropic-version: 2023-06-01" \
            --header "content-type: application/json" \
            --data '{
              "model": "claude-sonnet-4-5",
              "max_tokens": 400,
              "messages": [
                {"role": "user", "content": "'"${{ github.event.inputs.task }}"'"}
              ]
            }')
          echo "$CLAUDE_RESPONSE" > claude-output.json
          cat claude-output.json

      - name: Call OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          OPENAI_RESPONSE=$(curl -s https://api.openai.com/v1/responses \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-5.4-mini",
              "input": "'"${{ github.event.inputs.task }}"'"
            }')
          echo "$OPENAI_RESPONSE" > openai-output.json
          cat openai-output.json

      - name: Commit results
        run: |
          git config --global user.name "fracttalix-ai"
          git config --global user.email "admin@fracttalix.com"
          git add claude-output.json openai-output.json
          git diff --cached --quiet || git commit -m "Dual AI outputs"
          git push
