name: AI Task Runner

on:
  workflow_dispatch:
    inputs:
      task:
        description: "What should the AI do?"
        required: true
        default: "Explain anomaly detection"

permissions:
  contents: write

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run AI task
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          RESPONSE=$(curl -s https://api.openai.com/v1/responses \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-5.4-mini",
              "input": "'"${{ github.event.inputs.task }}"'"
            }')

          echo "$RESPONSE" > output.json
          cat output.json

      - name: Commit result
        run: |
          git config --global user.name "fracttalix-ai"
          git config --global user.email "admin@fracttalix.com"
          git add output.json
          git diff --cached --quiet || git commit -m "AI output"
          git push
